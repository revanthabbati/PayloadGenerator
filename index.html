<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payload Studio Pro | Neon Glass Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        obsidian: '#050508',
                        neonBlue: '#38bdf8',
                        neonPurple: '#a855f7',
                        neonPink: '#ec4899'
                    },
                    boxShadow: {
                        'neon-blue': '0 0 20px rgba(56, 189, 248, 0.3)',
                        'neon-purple': '0 0 25px rgba(168, 85, 247, 0.4)',
                    }
                }
            }

    <style>
        /* Base Theme Transitions */
        body { 
            background-color: #f8fafc; 
            color: #0f172a; 
            overflow: hidden; 
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        html.dark body { 
            background-color: #050508; 
            color: #e2e8f0; 
        }

        /* The Glass Panel Utility (Light & Dark) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
            transition: background 0.4s, border 0.4s, box-shadow 0.4s;
        }
        html.dark .glass-panel {
            background: rgba(20, 20, 28, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* Ambient Background Orbs */
        .ambient-orb { position: absolute; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; opacity: 0.3; transition: opacity 0.4s; }
        html.dark .ambient-orb { opacity: 0.6; }
        .orb-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(168,85,247,0.4) 0%, rgba(0,0,0,0) 70%); }
        .orb-2 { bottom: -10%; right: -5%; width: 45vw; height: 45vw; background: radial-gradient(circle, rgba(56,189,248,0.3) 0%, rgba(0,0,0,0) 70%); }
        .orb-3 { top: 40%; left: 30%; width: 30vw; height: 30vw; background: radial-gradient(circle, rgba(236,72,153,0.2) 0%, rgba(0,0,0,0) 70%); }

        /* Next-Gen Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        html.dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }
        html.dark ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

        /* Inputs & Controls */
        .glow-input {
            background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(0,0,0,0.1); color: #0f172a;
            border-radius: 12px; transition: all 0.3s ease; outline: none; padding: 0.6rem 1rem;
        }
        html.dark .glow-input {
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff;
        }
        .glow-input:focus {
            border-color: #a855f7; box-shadow: 0 0 15px rgba(168,85,247,0.2);
        }

        /* Neon Checkbox */
        .neon-cbx { appearance: none; width: 22px; height: 22px; border: 1px solid rgba(0,0,0,0.2); border-radius: 6px; background: rgba(255,255,255,0.8); cursor: pointer; position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0; }
        html.dark .neon-cbx { border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); }
        .neon-cbx:checked { background: #a855f7; border-color: #a855f7; box-shadow: 0 0 12px rgba(168,85,247,0.6); }
        .neon-cbx:checked::after { content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: white; font-size: 12px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* Button Gradients */
        .btn-neon {
            background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
            transition: all 0.3s ease;
            color: white;
        }
        .btn-neon:hover {
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.6); transform: translateY(-1px); border-color: rgba(255,255,255,0.4);
        }

        /* Editable Table Reset */
        td[contenteditable="true"]:focus { outline: none; background: rgba(56, 189, 248, 0.1); border-radius: 4px; box-shadow: inset 0 0 0 1px #38bdf8; }
    </style>
</head>

    <script>
        const x2js = new X2JS();
        let lastGeneratedFlatData = null;

        // Theme Toggle Logic
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.classList.replace('fa-sun', 'fa-moon'); // Switch icon to moon for light mode
            } else {
                html.classList.add('dark');
                icon.classList.replace('fa-moon', 'fa-sun'); // Switch icon to sun for dark mode
            }
        }
        
        // Initialize Theme Icon based on current state
        window.onload = () => {
            const icon = document.getElementById('themeIcon');
            if(document.documentElement.classList.contains('dark')) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        };

        function toggleUI(id, show) {
            document.getElementById(id).classList.toggle('hidden', !show);
        }

        function switchTab(tab) {
            document.getElementById('view-raw').classList.toggle('hidden', tab !== 'raw');
            document.getElementById('view-table').classList.toggle('hidden', tab !== 'table');
            
            const active = "px-5 py-2 text-sm font-semibold rounded-lg bg-white shadow-sm text-slate-800 dark:bg-white/10 dark:text-white transition";
            const inactive = "px-5 py-2 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-800 dark:text-gray-400 dark:hover:text-white transition";

            if (tab === 'raw') {
                document.getElementById('tab-raw').className = active;
                document.getElementById('tab-table').className = inactive;
                syncTableToRaw();
            } else {
                document.getElementById('tab-table').className = active;
                document.getElementById('tab-raw').className = inactive;
                renderTableFromRaw();
            }
        }

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('rawInput').value = await file.text();
                let fmt = document.getElementById('outputFormat');
                if (file.name.toLowerCase().endsWith('.xml')) fmt.value = 'xml';
                else if (file.name.toLowerCase().endsWith('.csv')) fmt.value = 'csv';
                else fmt.value = 'json';
            }
        });

        // Smart Date Retainer
        function formatMatchedDate(selectedDateStr, originalDateStr) {
            if(!selectedDateStr) return originalDateStr;
            let [y, m, d] = selectedDateStr.split('-');
            if (typeof originalDateStr === 'string' && originalDateStr.length > 0) {
                if (originalDateStr.includes('/')) return `${m}/${d}/${y}`; 
                if (originalDateStr.includes('-')) {
                    if (originalDateStr.split('-')[0].length === 4) return `${y}-${m}-${d}`; 
                    return `${m}-${d}-${y}`; 
                }
            }
            return `${m}-${d}-${y}`; 
        }

        // Fixed Smart Order Format Generator
        function generateFormattedOrderId(formatStr) {
            if (!formatStr) return "ORD-" + Math.floor(100000 + Math.random() * 900000);
            
            // If literal string without formatting tags, append digits
            if (!formatStr.includes('#') && !formatStr.includes('@')) {
                return formatStr + Math.floor(100000 + Math.random() * 900000);
            }

            return formatStr.split('').map(char => {
                if (char === '#') return Math.floor(Math.random() * 10).toString();
                if (char === '@') return String.fromCharCode(65 + Math.floor(Math.random() * 26));
                return char;
            }).join('');
        }

        function modifyObject(obj, opts, orderIdMap, isItemArray = false) {
            for (let key in obj) {
                if (typeof obj[key] === 'object' && obj[key] !== null) {
                    modifyObject(obj[key], opts, orderIdMap, isItemArray || key.toLowerCase().includes('item'));
                } else {
                    let k = key.toLowerCase();
                    let origVal = obj[key] ? obj[key].toString() : "";
                    
                    if (opts.rCustomer) {
                        if (k.includes('customer') || k.includes('name') || k.includes('ordered by') || k.includes('attn')) {
                            obj[key] = faker.company.companyName();
                        }
                        if (k.includes('address') || k.includes('street')) {
                            if (!k.includes('city') && !k.includes('state') && !k.includes('zip') && !k.includes('postal')) {
                                obj[key] = faker.address.streetAddress();
                            }
                        }
                    }

                    if (opts.rContact) {
                        if (k.includes('phone') || k.includes('mobile')) obj[key] = faker.phone.phoneNumberFormat();
                        if (k.includes('email') || k.includes('mail')) obj[key] = faker.internet.email();
                    }

                    if (opts.rItems && isItemArray) {
                        if (k.includes('desc') || k.includes('product')) obj[key] = faker.commerce.productName();
                        if (k.includes('sku') || k.includes('code')) obj[key] = faker.random.alphaNumeric(10).toUpperCase();
                    }

                    // Order Number Map
                    if ((k.includes('order') || k === 'id' || k.includes('#')) && 
                        !k.includes('account') && !k.includes('stop') && !k.includes('qty') && 
                        !k.includes('location') && !k.includes('item') && !k.includes('billing') && !k.includes('via')) {
                        
                        if (origVal.trim() !== "") {
                            if (!orderIdMap[origVal]) orderIdMap[origVal] = generateFormattedOrderId(opts.fmtOrder);
                            obj[key] = orderIdMap[origVal];
                        }
                    }

                    if (opts.useAcc && (k.includes('account') || k.includes('billing id'))) obj[key] = opts.valAcc;
                    if (opts.useDel && (k.includes('delivery') || k.includes('service') || k.includes('type') || k.includes('via'))) obj[key] = opts.valDel;
                    if (opts.useDate && (k.includes('date') || k.includes('ship') || k.includes('tw1'))) {
                        obj[key] = formatMatchedDate(opts.valDate, origVal);
                    }
                }
            }
        }

        function generateData() {
            const raw = document.getElementById('rawInput').value.trim();
            const count = parseInt(document.getElementById('orderCount').value) || 1;
            const outFormat = document.getElementById('outputFormat').value;
            const editor = document.getElementById('outputEditor');

            if (!raw) return alert("Source payload is required.");

            const opts = {
                fmtOrder: document.getElementById('orderFormat').value.trim(),
                rCustomer: document.getElementById('randCustomer').checked,
                rContact: document.getElementById('randContact').checked,
                rItems: document.getElementById('randItems').checked,
                useAcc: document.getElementById('reqAccount').checked,
                valAcc: document.getElementById('valAccount').value,
                useDel: document.getElementById('reqDelivery').checked,
                valDel: document.getElementById('valDelivery').value,
                useDate: document.getElementById('reqDate').checked,
                valDate: document.getElementById('valDate').value
            };

            try {
                let baseData;
                if (raw.startsWith('<')) baseData = x2js.xml_str2json(raw);
                else if (raw.startsWith('{') || raw.startsWith('[')) baseData = JSON.parse(raw);
                else baseData = Papa.parse(raw, { header: true, skipEmptyLines: true }).data;

                let finalData;

                if (Array.isArray(baseData)) {
                    finalData = [];
                    for(let i=0; i<count; i++) {
                        let cloneArray = JSON.parse(JSON.stringify(baseData));
                        let idMapForIteration = {}; 
                        cloneArray.forEach(row => modifyObject(row, opts, idMapForIteration));
                        finalData.push(...cloneArray);
                    }
                } else {
                    finalData = JSON.parse(JSON.stringify(baseData));
                    let arrayFound = false;

                    function traverseAndDuplicate(obj) {
                        if (arrayFound) return;
                        for (let k in obj) {
                            if (Array.isArray(obj[k]) && obj[k].length > 0) {
                                let template = obj[k][0];
                                let newArr = [];
                                for(let i=0; i<count; i++) {
                                    let idMapForIteration = {};
                                    let clone = JSON.parse(JSON.stringify(template));
                                    modifyObject(clone, opts, idMapForIteration);
                                    newArr.push(clone);
                                }
                                obj[k] = newArr;
                                arrayFound = true;
                                return;
                            } else if (typeof obj[k] === 'object' && obj[k] !== null) traverseAndDuplicate(obj[k]);
                        }
                    }
                    
                    traverseAndDuplicate(finalData);

                    if (!arrayFound) {
                        let flatArr = [];
                        for(let i=0; i<count; i++) {
                            let idMapForIteration = {};
                            let clone = JSON.parse(JSON.stringify(baseData));
                            modifyObject(clone, opts, idMapForIteration);
                            flatArr.push(clone);
                        }
                        finalData = flatArr;
                    }
                }

                if (outFormat === 'json') {
                    editor.value = JSON.stringify(finalData, null, 2);
                    editor.className = "absolute inset-0 w-full h-full bg-transparent text-slate-800 dark:text-neonPurple font-mono text-[13px] p-6 focus:outline-none custom-scroll resize-none";
                } else if (outFormat === 'xml') {
                    let xmlWrap = Array.isArray(finalData) ? { root: { record: finalData } } : finalData;
                    let xmlStr = x2js.json2xml_str(xmlWrap);
                    editor.value = xmlStr.replace(/(>)(<)(\/*)/g, '$1\n$2');
                    editor.className = "absolute inset-0 w-full h-full bg-transparent text-slate-800 dark:text-neonPink font-mono text-[13px] p-6 focus:outline-none custom-scroll resize-none";
                } else {
                    let flat = finalData;
                    if (!Array.isArray(finalData)) {
                        for(let k in finalData) { if(Array.isArray(finalData[k])) { flat = finalData[k]; break; } }
                    }
                    editor.value = Papa.unparse(flat);
                    editor.className = "absolute inset-0 w-full h-full bg-transparent text-slate-800 dark:text-neonBlue font-mono text-[13px] p-6 focus:outline-none custom-scroll resize-none";
                }

                if(!document.getElementById('view-table').classList.contains('hidden')) renderTableFromRaw();

            } catch (err) {
                editor.value = "// GENERATION ERROR:\n" + err.message;
            }
        }

        function renderTableFromRaw() {
            const txt = document.getElementById('outputEditor').value;
            const format = document.getElementById('outputFormat').value;
            let data = [];

            try {
                if (format === 'csv') data = Papa.parse(txt, {header: true, skipEmptyLines: true}).data;
                else if (format === 'json') {
                    let j = JSON.parse(txt);
                    data = Array.isArray(j) ? j : Object.values(j).find(v => Array.isArray(v)) || [j];
                } else {
                    document.getElementById('tableBody').innerHTML = "<tr><td class='p-8 text-red-500 font-medium'>XML tables are not supported. Use RAW view.</td></tr>";
                    return;
                }

                if(!data.length) return;

                const headers = Object.keys(data[0] || {});
                let headStr = "<tr>";
                headers.forEach(h => headStr += `<th class="px-5 py-3 border-b border-r border-black/5 dark:border-white/5 bg-black/5 dark:bg-black/40 first:border-l whitespace-nowrap">${h}</th>`);
                document.getElementById('tableHead').innerHTML = headStr + "</tr>";

                let bodyStr = "";
                data.forEach(row => {
                    bodyStr += "<tr class='hover:bg-black/5 dark:hover:bg-white/5 transition'>";
                    headers.forEach(h => {
                        let val = typeof row[h] === 'object' ? JSON.stringify(row[h]) : (row[h] || '');
                        bodyStr += `<td class="px-5 py-2.5 border-b border-r border-black/5 dark:border-white/5 first:border-l whitespace-nowrap" contenteditable="true">${val}</td>`;
                    });
                    bodyStr += "</tr>";
                });
                document.getElementById('tableBody').innerHTML = bodyStr;
                lastGeneratedFlatData = data;

            } catch(e) {
                document.getElementById('tableBody').innerHTML = `<tr><td class='p-8 text-red-500'>Table Render Error: ${e.message}</td></tr>`;
            }
        }

        function syncTableToRaw() {
            if (!lastGeneratedFlatData || document.getElementById('outputFormat').value === 'xml') return;
            const rows = document.getElementById('tableBody').querySelectorAll('tr');
            if(!rows.length || rows[0].innerText.includes('Generate data')) return;

            const headers = Array.from(document.getElementById('tableHead').querySelectorAll('th')).map(th => th.innerText);
            let arr = [];

            rows.forEach(tr => {
                let obj = {};
                tr.querySelectorAll('td').forEach((td, i) => obj[headers[i]] = td.innerText);
                arr.push(obj);
            });

            const fmt = document.getElementById('outputFormat').value;
            if (fmt === 'csv') document.getElementById('outputEditor').value = Papa.unparse(arr);
            else if (fmt === 'json') document.getElementById('outputEditor').value = JSON.stringify(arr, null, 2); 
        }

        function downloadOutput() {
            if(!document.getElementById('view-table').classList.contains('hidden')) syncTableToRaw();
            const txt = document.getElementById('outputEditor').value;
            if (!txt || txt.includes("ERROR:")) return alert("No valid data to download.");

            const fmt = document.getElementById('outputFormat').value;
            const mime = fmt === 'csv' ? 'text/csv' : (fmt === 'json' ? 'application/json' : 'application/xml');

            const blob = new Blob([txt], { type: mime });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `StudioOutput_${Date.now()}.${fmt}`;
            a.click();
        }
    </script>
